<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
</head>
<body>

  <div class="container">

    <!-- Tarjeta de nivel del usuario -->
    <div class="lvl-hero" id="lvl-hero" style="margin-top:24px;">
      <div class="lvl-hero-icon" id="lvl-icon">🌱</div>
      <div class="lvl-hero-info">
        <div class="lvl-hero-name" id="lvl-name">Novato</div>
        <div class="lvl-hero-pts" id="lvl-pts">0 puntos</div>
        <div class="progress-wrap">
          <div class="progress-bar" id="lvl-progress" style="width:0%"></div>
        </div>
        <div class="progress-label" id="lvl-progress-label"></div>
      </div>
    </div>

        <!-- Grid de accesos rápidos -->
        <div class="page-header" style="margin-top:30px;">
          <h2 class="page-title">Continúa donde lo dejaste</h2>
          <p class="page-sub">Tus cursos y atajos principales.</p>
        </div>

        <div class="grid grid-3">
          <a href="cursos.html" class="card card-hover" style="text-decoration:none;color:inherit;">
            <div style="font-size:32px;margin-bottom:10px;">📚</div>
            <div style="font-weight:700;font-size:15px;">Mis cursos</div>
            <div class="muted" style="font-size:12px;margin-top:4px;">Continúa aprendiendo</div>
          </a>
          <a href="comunidad.html" class="card card-hover" style="text-decoration:none;color:inherit;">
            <div style="font-size:32px;margin-bottom:10px;">💬</div>
            <div style="font-weight:700;font-size:15px;">Comunidad</div>
            <div class="muted" style="font-size:12px;margin-top:4px;">Participa y gana puntos</div>
          </a>
          <a href="eventos.html" class="card card-hover" style="text-decoration:none;color:inherit;">
            <div style="font-size:32px;margin-bottom:10px;">📅</div>
            <div style="font-weight:700;font-size:15px;">Próximos eventos</div>
            <div class="muted" style="font-size:12px;margin-top:4px;">Clases en vivo</div>
          </a>
        </div>

      </div>

  <!-- Tabbar móvil (lo rellena navbar.js) -->
  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, diasRestantes, tieneAcceso } from '../assets/js/auth.js';
    import { getNivel, getSiguienteNivel, formatNum } from '../assets/js/utils.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { session as sessObj } from '../assets/js/auth.js';

    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    function inicializar() {
      // Inyectar navbar superior
      renderNavbar('aula');

      const p = sessObj.profile;

      // Tarjeta de nivel
      const nivel = getNivel(p?.puntos || 0);
      document.getElementById('lvl-icon').textContent = nivel.emoji;
      document.getElementById('lvl-icon').style.background = `${nivel.color}18`;
      document.getElementById('lvl-name').textContent = nivel.nombre;
      document.getElementById('lvl-pts').textContent = `${formatNum(p?.puntos || 0)} puntos · Nivel ${nivel.num}`;

      const sig = getSiguienteNivel(p?.puntos || 0);
      const bar = document.getElementById('lvl-progress');
      const lbl = document.getElementById('lvl-progress-label');
      if (sig) {
        const pct = Math.round(((p.puntos - nivel.min) / (sig.min - nivel.min)) * 100);
        bar.style.width = `${pct}%`;
        bar.style.background = `linear-gradient(90deg, ${nivel.color}, ${sig.color})`;
        lbl.innerHTML = `<span>${nivel.nombre}</span><span>${sig.min - p.puntos} pts para ${sig.emoji} ${sig.nombre}</span>`;
      } else {
        bar.style.width = '100%';
        lbl.innerHTML = `<span>🌟 Nivel máximo alcanzado</span><span>¡Felicidades!</span>`;
      }
    }
  </script>
</body>
</html>
