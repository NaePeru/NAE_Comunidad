<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miembros — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
</head>
<body>

      <div class="container" style="max-width:720px;margin-top:24px;">

        <div class="page-header">
          <h1 class="page-title">Ranking 🏆</h1>
          <p class="page-sub">Quién está aportando más valor a la comunidad.</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-3" style="margin-bottom:24px;">
          <div class="card" style="text-align:center;padding:16px;">
            <div style="font-size:24px;font-weight:800;font-family:var(--font-mono);color:var(--gold);" id="stat-miembros">0</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">MIEMBROS</div>
          </div>
          <div class="card" style="text-align:center;padding:16px;">
            <div style="font-size:24px;font-weight:800;font-family:var(--font-mono);color:var(--green);" id="stat-activos">0</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">ACTIVOS / SEMANA</div>
          </div>
          <div class="card" style="text-align:center;padding:16px;">
            <div style="font-size:24px;font-weight:800;font-family:var(--font-mono);color:var(--blue);" id="stat-posts">0</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">PUBLICACIONES</div>
          </div>
        </div>

        <!-- Tabs: Semana / Total -->
        <div style="display:flex;gap:8px;margin-bottom:18px;">
          <button class="pill active" id="tab-semana" onclick="cambiarTab('semana')">📅 Esta semana</button>
          <button class="pill" id="tab-total" onclick="cambiarTab('total')">🏆 Histórico</button>
        </div>

        <!-- Leaderboard -->
        <div id="lb-list">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando ranking...</div>
        </div>

      </div>

  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { cargarLeaderboard, cargarRankingTotal, cargarStatsComunidad } from '../assets/js/miembros.js';

    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      renderNavbar('miembros');
      await cargarStatsComunidad();
      await cargarLeaderboard();
    }

    let tabActual = 'semana';
    async function cambiarTab(tab) {
      tabActual = tab;
      document.getElementById('tab-semana').classList.toggle('active', tab === 'semana');
      document.getElementById('tab-total').classList.toggle('active', tab === 'total');
      document.getElementById('lb-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div>Cargando...</div>';
      if (tab === 'semana') await cargarLeaderboard();
      else await cargarRankingTotal();
    }
    window.cambiarTab = cambiarTab;
  </script>
</body>
</html>
