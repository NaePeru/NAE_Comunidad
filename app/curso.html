<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
  <link rel="stylesheet" href="../assets/css/cursos.css">
</head>
<body>

      <div class="container" style="max-width:1100px;margin-top:24px;">
        <div id="curso-container">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando curso...</div>
        </div>
      </div>

  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { cargarCurso } from '../assets/js/cursos.js';

    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      renderNavbar('cursos');

      // Obtener ID del curso desde la URL (?id=...)
      const params = new URLSearchParams(window.location.search);
      const courseId = params.get('id');
      if (!courseId) {
        window.location.href = 'cursos.html';
        return;
      }
      await cargarCurso(courseId);
    }
  </script>
</body>
</html>
