<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Cursos — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
  <link rel="stylesheet" href="../assets/css/cursos.css">
</head>
<body>

  <!-- ════════ VISTA CATÁLOGO ════════ -->
  <div id="vista-catalogo">
    <div class="container courses-page" style="max-width:840px;margin-top:24px;">
      <div class="page-header">
        <h1 class="page-title">Cursos 📚</h1>
        <p class="page-sub">Aprende a tu ritmo. Empieza gratis y avanza cuando estés listo.</p>
      </div>

      <div class="course-filters">
        <button class="pill active" onclick="filtrarCursos('todo', this)">Todo</button>
        <button class="pill" onclick="filtrarCursos('gratis', this)">🎁 Gratis</button>
        <button class="pill" onclick="filtrarCursos('excel', this)">📊 Excel</button>
        <button class="pill" onclick="filtrarCursos('powerbi', this)">⚡ Power BI</button>
      </div>

        <div id="courses-list" class="courses-grid">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando cursos...</div>
        </div>
    </div>
  </div>

  <!-- ════════ VISTA CURSO (oculta por defecto) ════════ -->
  <div id="vista-curso" class="hidden">
    <div class="container" style="max-width:1100px;margin-top:24px;">
      <div id="curso-container">
        <div class="empty-state"><div class="empty-icon">⏳</div>Cargando curso...</div>
      </div>
    </div>
  </div>

  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { cargarCatalogo, bindClicksCatalogo } from '../assets/js/cursos.js';

    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      renderNavbar('cursos');
      await cargarCatalogo();
      // Conectar el listener de clicks después de renderizar el catálogo
      bindClicksCatalogo();
    }

    function filtrarCursos(filtro, btn) {
      document.querySelectorAll('#vista-catalogo .pill').forEach(p => p.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.querySelectorAll('.course-card').forEach(c => {
        const cat = c.dataset.categoria;
        const gratis = c.dataset.gratis;
        let mostrar = true;
        if (filtro === 'todo') mostrar = true;
        else if (filtro === 'gratis') mostrar = (gratis === 'si');
        else mostrar = (cat === filtro);
        c.style.display = mostrar ? 'flex' : 'none';
      });
    }
    window.filtrarCursos = filtrarCursos;
  </script>
</body>
</html>
