<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
  <link rel="stylesheet" href="../assets/css/cursos.css">
</head>
<body>

      <div class="container courses-page" style="max-width:840px;margin-top:24px;">

        <div class="page-header">
          <h1 class="page-title">Cursos 📚</h1>
          <p class="page-sub">Aprende a tu ritmo. Empieza gratis y avanza cuando estés listo.</p>
        </div>

        <!-- Filtros -->
        <div class="course-filters">
          <button class="pill active" onclick="filtrarCursos('todo', this)">Todo</button>
          <button class="pill" onclick="filtrarCursos('gratis', this)">🎁 Gratis</button>
          <button class="pill" onclick="filtrarCursos('excel', this)">📊 Excel</button>
          <button class="pill" onclick="filtrarCursos('powerbi', this)">⚡ Power BI</button>
        </div>

        <div id="courses-list">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando cursos...</div>
        </div>

      </div>

  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { cargarCatalogo } from '../assets/js/cursos.js';

    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      renderNavbar('cursos');
      await cargarCatalogo();
    }

    function filtrarCursos(filtro, btn) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      if (btn) btn.classList.add('active');

      document.querySelectorAll('.course-card').forEach(c => {
        const cat = c.dataset.categoria;
        const gratis = c.dataset.gratis;
        let mostrar = true;
        if (filtro === 'todo') mostrar = true;
        else if (filtro === 'gratis') mostrar = (gratis === 'si');
        else mostrar = (cat === filtro);
        c.style.display = mostrar ? 'flex' : 'none';
      });
    }
    window.filtrarCursos = filtrarCursos;
  </script>
</body>
</html>
