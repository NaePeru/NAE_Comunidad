<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidad — Proyecto Z</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
  <link rel="stylesheet" href="../assets/css/comunidad.css">
</head>
<body>

      <div class="container" style="max-width:760px;margin-top:24px;">

        <div class="page-header">
          <h1 class="page-title">Comunidad 💬</h1>
          <p class="page-sub">Comparte avances, resuelve dudas y motívate. Gana puntos participando.</p>
        </div>

        <!-- COMPOSER (caja para crear post) -->
        <div class="composer" id="composer">
          <textarea id="composer-text" placeholder="¿Qué quieres compartir? 

Usa **negrita**, *cursiva*, `código` o # títulos."></textarea>
          <div class="composer-footer">
            <select id="composer-cat">
              <option value="general">💬 General</option>
              <option value="excel">📊 MS Excel</option>
              <option value="powerbi">⚡ Power BI</option>
            </select>
            <button type="button" class="btn btn-live" id="live-btn" onclick="toggleLive()">
              🔴 LIVE
            </button>
            <button class="btn btn-primary" id="composer-btn" onclick="publicar()">
              Publicar →
            </button>
          </div>
          <div class="composer-hint">
            ❤️ Gana puntos cuando otros le den like a tus aportes ·
            <span id="live-status"></span>
          </div>
        </div>

        <!-- FILTROS -->
        <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
          <button class="pill active" onclick="filtrarCat('todo', this)">🌐 Todo</button>
          <button class="pill" onclick="filtrarCat('general', this)">💬 General</button>
          <button class="pill" onclick="filtrarCat('excel', this)">📊 Excel</button>
          <button class="pill" onclick="filtrarCat('powerbi', this)">⚡ Power BI</button>
        </div>

        <!-- FEED -->
        <div id="feed-list">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando publicaciones...</div>
        </div>

      </div>

  <!-- Tabbar móvil (lo rellena navbar.js) -->
  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { toast } from '../assets/js/utils.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { cargarFeed, crearPost, filtrar, iniciarRealtime } from '../assets/js/comunidad.js';

    // ── Verificar sesión ──
    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      renderNavbar('comunidad');

      // Cargar feed + realtime
      await cargarFeed();
      iniciarRealtime();

      // Refrescar navbar cuando cambian los puntos
      window.addEventListener('perfil-actualizado', () => {
        renderNavbar('comunidad');
      });
    }

    // ── Estado LIVE ──
    let liveActivo = false;
    function toggleLive() {
      liveActivo = !liveActivo;
      const btn = document.getElementById('live-btn');
      const status = document.getElementById('live-status');
      if (liveActivo) {
        btn.classList.add('active');
        status.innerHTML = '<strong style="color:#ff5b5b;">🔴 Modo LIVE activo (+5 pts bonus)</strong>';
      } else {
        btn.classList.remove('active');
        status.innerHTML = '';
      }
    }
    window.toggleLive = toggleLive;

    // ── Publicar nuevo post ──
    async function publicar() {
      const txt = document.getElementById('composer-text').value;
      const cat = document.getElementById('composer-cat').value;
      const btn = document.getElementById('composer-btn');

      if (!txt.trim()) { toast('⚠️ Escribe algo primero'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      const { error } = await crearPost(txt, cat, liveActivo);
      btn.disabled = false;
      btn.innerHTML = 'Publicar →';

      if (!error) {
        document.getElementById('composer-text').value = '';
        // Resetear LIVE tras publicar
        if (liveActivo) { liveActivo = false; toggleLive(); }
        await cargarFeed();
      }
    }
    window.publicar = publicar;

    // ── Filtrar ──
    function filtrarCat(cat, btn) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      if (btn) btn.classList.add('active');
      filtrar(cat);
    }
    window.filtrarCat = filtrarCat;
  </script>
</body>
</html>
