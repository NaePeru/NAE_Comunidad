<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidad — Proyecto Z</title>

  <!-- App Móvil (PWA) -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0B0F19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NAE">
  <link rel="apple-touch-icon" href="../assets/img/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/gamificacion.css">
  <link rel="stylesheet" href="../assets/css/comunidad.css">
</head>
<body>

      <div class="container" style="max-width:1000px;margin-top:24px;">

        <div class="community-layout">

        <!-- COLUMNA PRINCIPAL: Feed -->
        <div style="min-width:0;">

        <div class="page-header">
          <h1 class="page-title">Comunidad 💬</h1>
          <p class="page-sub">Comparte avances, resuelve dudas y motívate.</p>
        </div>

        <!-- COMPOSER (caja para crear post) -->
        <div class="composer" id="composer">
          <textarea id="composer-text" placeholder="Escribí algo..."></textarea>
          
          <!-- Preview de imagen -->
          <div id="image-preview" style="display:none; margin-top:8px; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:8px;">
            <img id="preview-img" src="" style="max-width:100%; max-height:200px; border-radius:6px;">
            <button onclick="window.__quitarImagen()" style="display:block; margin-top:6px; color:var(--red); background:none; border:none; cursor:pointer; font-size:12px;">❌ Quitar imagen</button>
          </div>

          <div class="composer-footer" id="composer-footer">
            <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="window.__manejarImagen(event)">
            <button type="button" class="composer-tool" onclick="document.getElementById('image-input').click()" title="Adjuntar imagen">🖼️</button>
            <button type="button" class="btn btn-live" id="live-btn" onclick="toggleLive()">
              🔴 LIVE
            </button>
            <button class="btn btn-primary" id="composer-btn" onclick="publicar()">
              Publicar →
            </button>
          </div>
        </div>

        <!-- FILTROS -->
        <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
          <button class="pill active" onclick="filtrarCat('general', this)">💬 General</button>
          <button class="pill" onclick="filtrarCat('excel', this)">📊 Excel</button>
          <button class="pill" onclick="filtrarCat('powerbi', this)">⚡ Power BI</button>
        </div>

        <!-- FEED -->
        <div id="feed-list">
          <div class="empty-state"><div class="empty-icon">⏳</div>Cargando publicaciones...</div>
        </div>

        </div>

        <!-- COLUMNA LATERAL: Panel de comunidad -->
        <aside class="community-panel">
          <div class="panel-card">
            <div class="panel-card-header">
              <div class="panel-card-icon">🎓</div>
              <div class="panel-card-title">Nae. Information</div>
            </div>
            <div class="panel-card-desc">
              Aprendé Excel, Power BI y SQL. Compartí conocimiento, ganá puntos y crecé como Analista de Datos junto a la comunidad.
            </div>
            <div class="panel-stats">
              <div>
                <div class="panel-stat-num" id="com-members">—</div>
                <div class="panel-stat-label">Miembros</div>
              </div>
              <div>
                <div class="panel-stat-num" id="com-online" style="color:var(--green);">—</div>
                <div class="panel-stat-label">Posts</div>
              </div>
            </div>
          </div>

          <div class="panel-card">
            <div class="panel-card-header">
              <div class="panel-card-icon">📡</div>
              <div class="panel-card-title">Próximo seminario</div>
            </div>
            <div class="panel-card-desc" id="com-next-event">
              Cargando...
            </div>
          </div>

          <div class="panel-card">
            <div class="panel-card-header">
              <div class="panel-card-icon">🏆</div>
              <div class="panel-card-title">Top de la semana</div>
            </div>
            <div id="com-top-week" style="font-size:13px;line-height:1.8;"></div>
          </div>
        </aside>

        </div>
      </div>

  <!-- Tabbar móvil (lo rellena navbar.js) -->
  <div class="tabbar"></div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js';
    import { cargarPerfilCompleto, session } from '../assets/js/auth.js';
    import { toast } from '../assets/js/utils.js';
    import { renderNavbar } from '../assets/js/navbar.js';
    import { verificarAcceso } from '../assets/js/guard.js';
    import { cargarFeed, crearPost, filtrar, iniciarRealtime, getFiltroActual } from '../assets/js/comunidad.js';

    // ── Verificar sesión ──
    const { data: { session: sess } } = await supabase.auth.getSession();
    if (!sess) {
      window.location.href = '../index.html';
    } else {
      await cargarPerfilCompleto();
      inicializar();
    }

    async function inicializar() {
      // Verificar si el usuario está aprobado. Si no, bloquear pantalla.
      if (!verificarAcceso()) return;

      renderNavbar('comunidad');

      // Si es móvil, eliminar el panel lateral del HTML directamente (sin depender de CSS)
      if (window.innerWidth <= 900) {
        const panel = document.querySelector('.community-panel');
        if (panel) panel.remove();
        const layout = document.querySelector('.community-layout');
        if (layout) layout.style.gridTemplateColumns = '1fr';
        const header = document.querySelector('.page-header');
        if (header) header.style.display = 'none';
      }

      // Cargar feed + realtime
      await cargarFeed();
      iniciarRealtime();

      // Cargar panel lateral derecho (solo si existe en PC)
      cargarPanelComunidad();

      // Refrescar navbar cuando cambian los puntos
      window.addEventListener('perfil-actualizado', () => {
        renderNavbar('comunidad');
      });
    }

    // ── Cargar datos del panel lateral ──
    async function cargarPanelComunidad() {
      // Total miembros
      const { count: totalMiembros } = await supabase.from('profiles').select('id', { count: 'exact', head: true });
      const elM = document.getElementById('com-members');
      if (elM) elM.textContent = totalMiembros || 0;

      // Total posts
      const { count: totalPosts } = await supabase.from('posts').select('id', { count: 'exact', head: true });
      const elP = document.getElementById('com-online');
      if (elP) elP.textContent = totalPosts || 0;

      // Próximo evento
      const hoy = new Date().toISOString().split('T')[0];
      const { data: eventos } = await supabase
        .from('events').select('titulo, fecha, hora').gte('fecha', hoy).order('fecha').limit(1);
      const elE = document.getElementById('com-next-event');
      if (elE) {
        if (eventos && eventos.length > 0) {
          const e = eventos[0];
          const f = new Date(e.fecha + 'T00:00:00').toLocaleDateString('es-PE', { day:'numeric', month:'short' });
          elE.innerHTML = `📅 ${f}${e.hora ? ' · ' + e.hora.substring(0,5) : ''}<br><strong style="color:var(--gold);">${e.titulo}</strong>`;
        } else {
          elE.textContent = 'Próximamente anunciaremos el siguiente seminario. ¡Stay tuned!';
        }
      }

      // Top de la semana
      const { data: top } = await supabase
        .from('leaderboard_semanal')
        .select('nombre, puntos_semana').gt('puntos_semana', 0).order('posicion').limit(5);
      const elT = document.getElementById('com-top-week');
      if (elT) {
        if (top && top.length > 0) {
          elT.innerHTML = top.map((u, i) => {
            const medal = ['🥇','🥈','🥉'][i] || `${i+1}.`;
            return `<div style="display:flex;justify-content:space-between;padding:3px 0;">${medal} ${u.nombre} <strong style="color:var(--gold);">${u.puntos_semana}</strong></div>`;
          }).join('');
        } else {
          elT.innerHTML = '<span style="color:var(--muted2);">Aún no hay actividad esta semana.</span>';
        }
      }
    }

    // ── Estado LIVE ──
    let liveActivo = false;
    let imagenPendiente = null; // Base64 string de la imagen a subir

    // ── Manejo de imágenes en el composer ──
    window.__manejarImagen = (event) => {
      const file = event.target.files[0];
      if (!file) return;

      // Validar tipo
      if (!file.type.startsWith('image/')) {
        toast('⚠️ El archivo debe ser una imagen');
        return;
      }
      // Validar tamaño (máx 4MB antes de comprimir)
      if (file.size > 4 * 1024 * 1024) {
        toast('⚠️ La imagen es muy grande (máx 4MB)');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          // COMPRIMIR automáticamente
          const canvas = document.createElement('canvas');
          const maxW = 1080; // Resolución web óptima
          let w = img.width;
          let h = img.height;
          if (w > maxW) {
            h = Math.round((h * maxW) / w);
            w = maxW;
          }
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);

          // Convertir a Base64 (formato JPEG para ahorrar espacio)
          imagenPendiente = canvas.toDataURL('image/jpeg', 0.75);
          
          // Mostrar preview
          const prev = document.getElementById('image-preview');
          const prevImg = document.getElementById('preview-img');
          prevImg.src = imagenPendiente;
          prev.style.display = 'block';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.__quitarImagen = () => {
      imagenPendiente = null;
      document.getElementById('image-preview').style.display = 'none';
      document.getElementById('image-input').value = '';
    };
    function toggleLive() {
      liveActivo = !liveActivo;
      const btn = document.getElementById('live-btn');
      if (liveActivo) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }
    window.toggleLive = toggleLive;

    // ── Expandir composer al hacer focus (móvil) ──
    const composerText = document.getElementById('composer-text');
    const composerEl = document.getElementById('composer');
    if (composerText && composerEl) {
      composerText.addEventListener('focus', () => composerEl.classList.add('expanded'));
      // Opcional: contraer si se hace click fuera y está vacío
      document.addEventListener('click', (e) => {
        if (!composerEl.contains(e.target) && !composerText.value.trim()) {
          composerEl.classList.remove('expanded');
        }
      });
    }

    // ── Publicar nuevo post ──
    async function publicar() {
      const txt = document.getElementById('composer-text').value;
      const btn = document.getElementById('composer-btn');
      const cat = getFiltroActual ? getFiltroActual() : 'general';

      if (!txt.trim() && !imagenPendiente) { toast('⚠️ Escribe algo o adjunta una imagen'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Publicando...';

      let urlImagen = null;

      if (imagenPendiente) {
        const { subirImagenComunidad } = await import('../assets/js/storage.js');
        const { url, error: errSub } = await subirImagenComunidad(imagenPendiente);
        if (errSub) {
          toast('⚠️ Error al subir imagen');
          btn.disabled = false;
          btn.innerHTML = 'Publicar →';
          return;
        }
        urlImagen = url;
      }

      const { error } = await crearPost(txt, cat, liveActivo, urlImagen);
      btn.disabled = false;
      btn.innerHTML = 'Publicar →';

      if (!error) {
        document.getElementById('composer-text').value = '';
        window.__quitarImagen();
        if (liveActivo) { liveActivo = false; toggleLive(); }
        await cargarFeed();
      }
    }
    window.publicar = publicar;

    // ── Filtrar ──
    function filtrarCat(cat, btn) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      if (btn) btn.classList.add('active');
      filtrar(cat);
    }
    window.filtrarCat = filtrarCat;
  </script>
</body>
</html>
